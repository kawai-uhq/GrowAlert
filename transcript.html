<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transcript Viewer — GrowAlert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue:#5c85f5;--bg:#060d1a;--surface:#0d1d38;--surface2:#122240;
      --border:rgba(92,133,245,0.14);--text:#dde8ff;--text-muted:#6a85c0;--red:#f04040;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;overflow:hidden;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;display:flex;flex-direction:column;}

    .topbar{
      height:54px;flex-shrink:0;
      background:rgba(6,13,26,0.95);
      border-bottom:1px solid var(--border);
      backdrop-filter:blur(12px);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 20px;gap:16px;
    }
    .topbar-left{display:flex;align-items:center;gap:12px;min-width:0;}
    .topbar-logo{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0;}
    .topbar-logo-icon{width:28px;height:28px;border-radius:6px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;}
    .topbar-logo-text{font-weight:700;font-size:15px;color:var(--text);}
    .topbar-logo-text span{color:var(--blue);}
    .topbar-divider{width:1px;height:18px;background:var(--border);flex-shrink:0;}
    .topbar-title{font-size:13px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
    .topbar-title strong{color:var(--text);}
    .topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
    .topbar-btn{
      display:inline-flex;align-items:center;gap:6px;
      padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;
      text-decoration:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;
      transition:background 0.2s,border-color 0.2s;
    }
    .topbar-btn-outline{background:transparent;color:var(--text-muted);border:1px solid var(--border);}
    .topbar-btn-outline:hover{border-color:rgba(92,133,245,0.38);color:var(--text);background:var(--surface);}
    .topbar-btn-primary{background:var(--blue);color:#fff;}
    .topbar-btn-primary:hover{background:#4470e8;}

    .viewer{flex:1;position:relative;overflow:hidden;}

    /* URL input state */
    .url-prompt{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      flex-direction:column;gap:16px;padding:24px;text-align:center;
    }
    .url-prompt-icon{font-size:40px;margin-bottom:8px;}
    .url-prompt-title{font-size:20px;font-weight:700;color:var(--text);}
    .url-prompt-sub{font-size:14px;color:var(--text-muted);max-width:440px;line-height:1.6;}
    .url-input-row{display:flex;gap:8px;width:100%;max-width:520px;}
    .url-input{
      flex:1;padding:11px 14px;
      background:var(--surface);border:1px solid var(--border);
      border-radius:9px;color:var(--text);font-size:13px;
      font-family:'Inter',sans-serif;outline:none;
      transition:border-color 0.2s;
    }
    .url-input::placeholder{color:var(--text-muted);}
    .url-input:focus{border-color:rgba(92,133,245,0.5);}
    .url-load-btn{
      padding:11px 20px;border-radius:9px;background:var(--blue);
      color:#fff;border:none;cursor:pointer;
      font-size:13px;font-weight:600;font-family:'Inter',sans-serif;
      white-space:nowrap;transition:background 0.2s;
    }
    .url-load-btn:hover{background:#4470e8;}
    .url-load-btn:disabled{opacity:0.5;cursor:not-allowed;}

    /* Loading/error states */
    .state-msg{
      position:absolute;inset:0;display:none;align-items:center;justify-content:center;
      flex-direction:column;gap:12px;text-align:center;padding:24px;
    }
    .state-msg.show{display:flex;}
    .state-icon{font-size:36px;}
    .state-title{font-size:18px;font-weight:700;color:var(--text);}
    .state-sub{font-size:14px;color:var(--text-muted);max-width:400px;line-height:1.5;}
    .state-retry{
      padding:9px 20px;border-radius:8px;background:var(--blue);
      color:#fff;border:none;cursor:pointer;font-size:13px;font-weight:600;
      font-family:'Inter',sans-serif;margin-top:4px;transition:background 0.2s;
    }
    .state-retry:hover{background:#4470e8;}

    iframe{
      width:100%;height:100%;border:none;display:none;
      background:#fff;
    }
    iframe.show{display:block;}
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <a class="topbar-logo" href="/">
        <div class="topbar-logo-icon">GA</div>
        <span class="topbar-logo-text">Grow<span>Alert</span></span>
      </a>
      <div class="topbar-divider"></div>
      <div class="topbar-title" id="topbarTitle">Transcript Viewer</div>
    </div>
    <div class="topbar-right">
      <a class="topbar-btn topbar-btn-outline" id="openRawBtn" href="#" target="_blank" rel="noopener" style="display:none">Raw ↗</a>
      <a class="topbar-btn topbar-btn-outline" href="/">← Home</a>
    </div>
  </div>

  <div class="viewer">
    <!-- URL prompt (default) -->
    <div class="url-prompt" id="urlPrompt">
      <div class="url-prompt-icon">📄</div>
      <div class="url-prompt-title">Transcript Viewer</div>
      <div class="url-prompt-sub">Enter a Discord CDN URL to view a ticket transcript, or open this page with a <code style="background:var(--surface);padding:2px 6px;border-radius:4px;font-size:12px">?url=</code> parameter.</div>
      <div class="url-input-row">
        <input class="url-input" id="urlInput" type="text" placeholder="https://cdn.discordapp.com/attachments/…" autocomplete="off" />
        <button class="url-load-btn" id="urlLoadBtn">Load</button>
      </div>
    </div>

    <!-- Loading -->
    <div class="state-msg" id="loadingState">
      <div class="state-icon">⏳</div>
      <div class="state-title">Loading transcript…</div>
      <div class="state-sub">Fetching from Discord CDN.</div>
    </div>

    <!-- Error -->
    <div class="state-msg" id="errorState">
      <div class="state-icon">⚠️</div>
      <div class="state-title" id="errorTitle">Failed to load</div>
      <div class="state-sub" id="errorSub">Could not fetch the transcript.</div>
      <button class="state-retry" id="retryBtn">Try Again</button>
    </div>

    <iframe id="transcriptFrame" title="Ticket Transcript" sandbox="allow-same-origin allow-scripts"></iframe>
  </div>

  <script>
    const frame       = document.getElementById('transcriptFrame');
    const urlPrompt   = document.getElementById('urlPrompt');
    const loadingState= document.getElementById('loadingState');
    const errorState  = document.getElementById('errorState');
    const errorTitle  = document.getElementById('errorTitle');
    const errorSub    = document.getElementById('errorSub');
    const topbarTitle = document.getElementById('topbarTitle');
    const openRawBtn  = document.getElementById('openRawBtn');
    const urlInput    = document.getElementById('urlInput');
    const urlLoadBtn  = document.getElementById('urlLoadBtn');
    const retryBtn    = document.getElementById('retryBtn');

    let currentUrl = null;

    function show(state) {
      urlPrompt.style.display    = state === 'prompt'  ? 'flex' : 'none';
      loadingState.className     = 'state-msg' + (state === 'loading' ? ' show' : '');
      errorState.className       = 'state-msg' + (state === 'error'   ? ' show' : '');
      frame.className            = state === 'loaded'  ? 'show' : '';
    }

    async function loadTranscript(rawUrl) {
      if (!rawUrl) return;
      currentUrl = rawUrl;
      show('loading');
      openRawBtn.style.display = 'none';
      topbarTitle.textContent  = 'Loading…';

      try {
        const res = await fetch('/api/transcript?url=' + encodeURIComponent(rawUrl), {
          signal: AbortSignal.timeout(20000)
        });
        if (!res.ok) throw new Error(`Server returned ${res.status}`);
        const html = await res.text();
        frame.srcdoc = html;
        frame.onload = () => {
          show('loaded');
          // Try to read channel name from title
          try {
            const doc   = frame.contentDocument || frame.contentWindow.document;
            const title = doc.title || '';
            topbarTitle.innerHTML = title
              ? `<strong>${escHtml(title)}</strong>`
              : '<strong>Transcript</strong>';
          } catch { topbarTitle.innerHTML = '<strong>Transcript</strong>'; }
          openRawBtn.href = rawUrl;
          openRawBtn.style.display = 'inline-flex';
        };
      } catch (err) {
        show('error');
        errorTitle.textContent = 'Failed to load transcript';
        errorSub.textContent   = err.message || 'Could not fetch the transcript from the server.';
        topbarTitle.textContent = 'Transcript Viewer';
      }
    }

    function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // ── Init from URL param ───────────────────────────────────────────
    const params   = new URLSearchParams(window.location.search);
    const urlParam = params.get('url');
    if (urlParam) { show('loading'); loadTranscript(urlParam); }
    else          { show('prompt'); }

    // ── Manual URL input ─────────────────────────────────────────────
    function tryLoadInput() {
      const v = urlInput.value.trim();
      if (!v) return;
      loadTranscript(v);
    }
    urlLoadBtn.addEventListener('click', tryLoadInput);
    urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLoadInput(); });
    retryBtn.addEventListener('click', () => { if (currentUrl) loadTranscript(currentUrl); });
  </script>

</body>
</html>
