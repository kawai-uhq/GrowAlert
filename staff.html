<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff — GrowAlert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue:#5c85f5;--blue-dim:#4470e8;--blue-dark:#1e3a8a;--blue-glow:rgba(92,133,245,0.15);
      --bg:#060d1a;--bg2:#09142a;--surface:#0d1d38;--surface2:#122240;
      --border:rgba(92,133,245,0.14);--border-bright:rgba(92,133,245,0.38);
      --text:#dde8ff;--text-muted:#6a85c0;--text-dim:#2d4080;--red:#f04040;--yellow:#f5a524;
    }
    [data-theme="light"] {
      --blue:#2f5de8;--blue-dim:#1a48d4;--blue-glow:rgba(47,93,232,0.1);
      --bg:#f0f4ff;--bg2:#e4ecff;--surface:#ffffff;--surface2:#eaf0ff;
      --border:rgba(47,93,232,0.14);--border-bright:rgba(47,93,232,0.38);
      --text:#0a1540;--text-muted:#4a65b0;--text-dim:#a0b0d0;--red:#cc2222;--yellow:#b8860b;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
    img{pointer-events:none;-webkit-user-drag:none;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow-x:hidden;min-height:100vh;}
    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-track{background:var(--bg);}
    ::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px;}

    nav{position:fixed;top:0;left:0;right:0;z-index:100;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(6,13,26,0.9);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);gap:16px;}
    [data-theme="light"] nav{background:rgba(240,244,255,0.92);}
    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
    .nav-logo-icon{width:34px;height:34px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;letter-spacing:-0.5px;}
    .nav-logo-text{font-weight:700;font-size:18px;color:var(--text);}
    .nav-logo-text span{color:var(--blue);}
    .nav-center{display:flex;align-items:center;gap:4px;}
    @media(max-width:700px){.nav-center{display:none;}}
    .nav-center a{text-decoration:none;color:var(--text-muted);font-size:14px;font-weight:500;padding:6px 14px;border-radius:8px;transition:color 0.2s,background 0.2s;}
    .nav-center a:hover{color:var(--text);background:var(--surface);}
    .nav-center a.active{color:var(--blue);}
    .nav-right{display:flex;align-items:center;gap:8px;}
    .btn-discord{display:flex;align-items:center;gap:7px;background:var(--blue);color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;transition:background 0.2s;white-space:nowrap;}
    .btn-discord:hover{background:var(--blue-dim);}
    @media(max-width:480px){.btn-discord span{display:none;}}
    .theme-btn{width:34px;height:34px;border-radius:8px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:border-color 0.2s,background 0.2s;}
    .theme-btn:hover{border-color:var(--border-bright);background:var(--surface2);}

    .page-header{padding:120px 24px 60px;text-align:center;max-width:620px;margin:0 auto;}
    .page-label{font-size:11px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;}
    .page-title{font-size:clamp(28px,5vw,48px);font-weight:700;color:var(--text);letter-spacing:-1px;margin-bottom:14px;}
    .page-sub{font-size:16px;color:var(--text-muted);line-height:1.7;}

    .section{padding:0 24px 80px;max-width:1000px;margin:0 auto;}

    .staff-section-title{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:1.5px;padding:28px 0 14px;display:flex;align-items:center;gap:12px;}
    .staff-section-title::after{content:'';flex:1;height:1px;background:var(--border);}
    .staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}

    .staff-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 16px;text-align:center;cursor:pointer;transition:border-color 0.2s,transform 0.15s,background 0.2s;pointer-events:all;}
    .staff-card *{pointer-events:none;}
    .staff-card:hover{border-color:var(--border-bright);transform:translateY(-2px);background:var(--surface2);}
    .staff-avatar-wrap{position:relative;display:inline-block;margin-bottom:12px;}
    .staff-avatar{width:60px;height:60px;border-radius:50%;object-fit:cover;display:block;}
    .staff-status{position:absolute;bottom:2px;right:2px;width:13px;height:13px;border-radius:50%;border:2px solid var(--surface);}
    .staff-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .staff-role{font-size:11px;color:var(--text-muted);font-weight:500;}

    /* Profile overlay */
    .overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.65);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.2s;}
    .overlay.open{opacity:1;pointer-events:all;}
    .profile-modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;width:100%;max-width:360px;overflow:hidden;transform:scale(0.95);transition:transform 0.2s;}
    .overlay.open .profile-modal{transform:scale(1);}
    .profile-banner{height:90px;background:var(--blue-dark);position:relative;overflow:hidden;}
    .profile-banner-img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
    .profile-close-btn{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,0.5);border:none;cursor:pointer;color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;}
    .profile-avatar-wrap{position:absolute;bottom:-22px;left:20px;width:72px;height:72px;}
    .profile-avatar{width:72px;height:72px;border-radius:50%;border:4px solid var(--surface);object-fit:cover;display:block;}
    .profile-status-dot{position:absolute;bottom:4px;right:4px;width:14px;height:14px;border-radius:50%;border:3px solid var(--surface);}
    .profile-deco{position:absolute;inset:-4px;width:calc(100% + 8px);height:calc(100% + 8px);pointer-events:none;}
    .profile-body{padding:30px 20px 20px;}
    .profile-name{font-size:18px;font-weight:700;color:var(--text);}
    .profile-username{font-size:13px;color:var(--text-muted);margin-top:2px;}
    .profile-role-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-top:8px;margin-bottom:14px;}
    .profile-custom-status{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:8px;background:var(--bg2);border:1px solid var(--border);font-size:12px;color:var(--text-muted);margin-bottom:14px;}
    .profile-divider{height:1px;background:var(--border);margin:14px 0;}
    .profile-section-title{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
    .profile-bio{font-size:13px;color:var(--text-muted);line-height:1.5;margin-bottom:14px;}
    .profile-dates{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
    .profile-date-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted);}
    .profile-date-icon{width:26px;height:26px;border-radius:6px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
    .profile-actions{display:flex;gap:8px;margin-top:16px;}
    .profile-action-btn{flex:1;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:border-color 0.2s,background 0.2s;}
    .profile-action-btn:hover{border-color:var(--border-bright);background:var(--bg2);}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;opacity:0;transition:opacity 0.2s,transform 0.2s;pointer-events:none;z-index:300;white-space:nowrap;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    footer{border-top:1px solid var(--border);padding:32px 24px;text-align:center;}
    .footer-logo{display:inline-flex;align-items:center;gap:8px;text-decoration:none;margin-bottom:12px;}
    .footer-logo-icon{width:28px;height:28px;border-radius:6px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;}
    .footer-logo-text{font-weight:700;font-size:16px;color:var(--text);}
    .footer-logo-text span{color:var(--blue);}
    .footer-links{display:flex;flex-wrap:wrap;justify-content:center;gap:4px 16px;margin-bottom:16px;}
    .footer-links a{font-size:13px;color:var(--text-muted);text-decoration:none;transition:color 0.2s;}
    .footer-links a:hover{color:var(--blue);}
    .footer-copy{font-size:12px;color:var(--text-dim);}

    .fade-up{opacity:0;transform:translateY(20px);transition:opacity 0.5s ease,transform 0.5s ease;}
    .fade-up.visible{opacity:1;transform:translateY(0);}
    .listings-empty{padding:40px 0;text-align:center;font-size:14px;color:var(--text-muted);}
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="/"><div class="nav-logo-icon">GA</div><span class="nav-logo-text">Grow<span>Alert</span></span></a>
    <div class="nav-center">
      <a href="/">Home</a><a href="/bots">Bots</a><a href="/staff" class="active">Staff</a>
    </div>
    <div class="nav-right">
      <a class="btn-discord" href="https://discord.gg/GrowAlert" target="_blank" rel="noopener">
        <svg width="16" height="12" viewBox="0 0 24 18" fill="currentColor"><path d="M20.32 1.37A19.8 19.8 0 0015.45 0c-.21.38-.46.9-.63 1.3a18.27 18.27 0 00-5.64 0A13.5 13.5 0 008.54 0a19.86 19.86 0 00-4.88 1.38C.52 6.04-.32 10.57.1 15.05a20.04 20.04 0 006.12 3.1c.49-.67.93-1.39 1.3-2.14a12.96 12.96 0 01-2.05-1c.17-.12.34-.26.5-.39a14.27 14.27 0 0012.27 0c.16.13.33.27.5.39-.65.39-1.33.72-2.06 1 .37.75.81 1.47 1.3 2.14a20 20 0 006.13-3.1c.5-5.14-.85-9.63-3.79-13.68zM8.02 12.35c-1.22 0-2.22-1.12-2.22-2.5s.97-2.5 2.22-2.5c1.24 0 2.24 1.12 2.22 2.5 0 1.38-.98 2.5-2.22 2.5zm8.17 0c-1.22 0-2.22-1.12-2.22-2.5s.97-2.5 2.22-2.5c1.24 0 2.24 1.12 2.22 2.5 0 1.38-.97 2.5-2.22 2.5z"/></svg>
        <span>Join Discord</span>
      </a>
      <button class="theme-btn" id="themeBtn">🌙</button>
    </div>
  </nav>

  <div class="page-header fade-up">
    <div class="page-label">Staff</div>
    <div class="page-title">Meet the team</div>
    <div class="page-sub">Our dedicated volunteers who keep GrowAlert running. Click any card to see their full profile.</div>
  </div>

  <div class="section fade-up" id="staff-section">
    <div id="staffGrid"><div class="listings-empty">Loading staff…</div></div>
  </div>

  <footer class="fade-up">
    <a class="footer-logo" href="/"><div class="footer-logo-icon">GA</div><span class="footer-logo-text">Grow<span>Alert</span></span></a>
    <div class="footer-links">
      <a href="/">Home</a><a href="/bots">Bots</a><a href="/staff">Staff</a>
      <a href="https://discord.gg/GrowAlert" target="_blank">Discord</a>
    </div>
    <div class="footer-copy">© 2026 GrowAlert. All rights reserved.</div>
  </footer>

  <!-- Profile Overlay -->
  <div class="overlay" id="profileOverlay">
    <div class="profile-modal" id="profileModal">
      <div class="profile-banner" id="profileBannerBg">
        <img class="profile-banner-img" id="profileBannerImg" src="" alt="" style="display:none" />
        <button class="profile-close-btn" id="profileCloseBtn">✕</button>
        <div class="profile-avatar-wrap">
          <img class="profile-avatar" id="profileAvatar" src="" alt="" />
          <img class="profile-deco" id="profileDecoration" src="" alt="" style="display:none" />
          <div class="profile-status-dot" id="profileStatusDot"></div>
        </div>
      </div>
      <div class="profile-body">
        <div class="profile-name" id="profileName"></div>
        <div class="profile-username" id="profileUsername"></div>
        <div class="profile-role-badge" id="profileRoleBadge"></div>
        <div class="profile-custom-status" id="profileCustomBubble" style="display:none">
          <span id="profileCustomStatusEmoji"></span>
          <span id="profileCustomStatus"></span>
        </div>
        <div id="profileAboutSection" style="display:none">
          <div class="profile-section-title">About Me</div>
          <div class="profile-bio" id="profileBio"></div>
        </div>
        <div class="profile-section-title">Member Since</div>
        <div class="profile-dates">
          <div class="profile-date-row">
            <div class="profile-date-icon">🌐</div>
            <div><span id="profileCreatedAt"></span><br><span style="font-size:11px">Discord</span></div>
          </div>
          <div class="profile-date-row" id="profileJoinedRow" style="display:none">
            <div class="profile-date-icon" id="profileGuildIconWrap">🛡️</div>
            <div><span id="profileJoinedAt"></span><br><span style="font-size:11px">GrowAlert</span></div>
          </div>
        </div>
        <div class="profile-actions">
          <button class="profile-action-btn" id="copyUsername">Copy Username</button>
          <button class="profile-action-btn" id="copyUserId">Copy ID</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const themeBtn = document.getElementById('themeBtn');
    const saved = localStorage.getItem('ga-theme') || 'dark';
    applyTheme(saved);
    function applyTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('ga-theme',t);themeBtn.textContent=t==='dark'?'🌙':'☀️';}
    themeBtn.addEventListener('click',()=>applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'));

    const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});},{threshold:0.1});
    document.querySelectorAll('.fade-up').forEach(el=>obs.observe(el));

    const STATUS_COLORS={online:'#23a55a',idle:'#f0b232',dnd:'#f23f43',offline:'#80848e'};
    window._staffFlat=[];

    function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

    async function loadStaff(){
      const grid=document.getElementById('staffGrid');
      try{
        const data=await fetch('/api/staff').then(r=>r.json());
        if(!data.tiers?.length&&!data.members?.length){grid.innerHTML='<div class="listings-empty">No staff data.</div>';return;}
        window._guildIcon=data.guildIcon||null;
        let html='',idx=0;
        const tiers=data.tiers||[{name:'Staff',color:null,members:data.members||[]}];
        for(const tier of tiers){
          if(!tier.members?.length)continue;
          const col=tier.color&&tier.color!=='#000000'?tier.color:'#5c85f5';
          html+=`<div class="staff-section-title" style="color:${col}">${esc(tier.name||'Staff')}</div><div class="staff-grid">`;
          for(const m of tier.members){
            window._staffFlat[idx]={...m,tier:tier.name};
            const rc=m.roleColor&&m.roleColor!=='#000000'?m.roleColor:col;
            html+=`<div class="staff-card" data-idx="${idx}"><div class="staff-avatar-wrap"><img class="staff-avatar" src="${m.avatar||''}" alt="${esc(m.name||'')}" loading="lazy"/><div class="staff-status" style="background:${STATUS_COLORS[m.status||'offline']||'#80848e'}"></div></div><div class="staff-name">${esc(m.name||m.username||'')}</div><div class="staff-role" style="color:${rc}">${esc(m.role||tier.name)}</div></div>`;
            idx++;
          }
          html+='</div>';
        }
        grid.innerHTML=html;
      }catch{grid.innerHTML='<div class="listings-empty">Could not load staff.</div>';}
    }
    loadStaff();

    const overlay=document.getElementById('profileOverlay');
    const closeBtn=document.getElementById('profileCloseBtn');
    const toast=document.getElementById('toast');
    let currentMember=null;

    function showToast(msg){toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);}
    function fmtDate(iso){if(!iso)return'';return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}

    function openProfile(m){
      currentMember=m;
      const rc=m.roleColor&&m.roleColor!=='#000000'?m.roleColor:'#5c85f5';
      const bannerImg=document.getElementById('profileBannerImg');
      const bannerBg=document.getElementById('profileBannerBg');
      if(m.banner){bannerImg.src=m.banner;bannerImg.style.display='block';bannerBg.style.background='';}
      else{bannerImg.style.display='none';bannerBg.style.background=`linear-gradient(135deg,${rc}88,${rc}22)`;}
      document.getElementById('profileAvatar').src=m.avatar||'';
      const deco=document.getElementById('profileDecoration');
      if(m.decoration){deco.src=m.decoration;deco.style.display='block';}else deco.style.display='none';
      document.getElementById('profileStatusDot').style.background=STATUS_COLORS[m.status||'offline']||'#80848e';
      document.getElementById('profileName').textContent=m.name||'';
      document.getElementById('profileUsername').textContent='@'+(m.username||m.name||'');
      const badge=document.getElementById('profileRoleBadge');
      badge.textContent=m.role||m.tier||'';
      badge.style.cssText=`background:${rc}22;color:${rc};border:1px solid ${rc}55`;
      const bio=document.getElementById('profileAboutSection');
      if(m.bio){document.getElementById('profileBio').textContent=m.bio;bio.style.display='block';}else bio.style.display='none';
      const cs=m.customStatus;
      const bubble=document.getElementById('profileCustomBubble');
      if(cs&&(cs.text||cs.emoji)){
        document.getElementById('profileCustomStatus').textContent=cs.text||'';
        const emoji=document.getElementById('profileCustomStatusEmoji');
        if(cs.emojiUrl)emoji.innerHTML=`<img src="${cs.emojiUrl}" style="width:14px;height:14px;object-fit:contain"/>`;
        else if(cs.emoji)emoji.textContent=cs.emoji;else emoji.innerHTML='';
        bubble.style.display='flex';
      }else bubble.style.display='none';
      document.getElementById('profileCreatedAt').textContent=fmtDate(m.createdAt);
      const joinRow=document.getElementById('profileJoinedRow');
      if(m.joinedAt){
        document.getElementById('profileJoinedAt').textContent=fmtDate(m.joinedAt);
        const iconWrap=document.getElementById('profileGuildIconWrap');
        if(window._guildIcon)iconWrap.innerHTML=`<img src="${window._guildIcon}" style="width:16px;height:16px;border-radius:4px;object-fit:cover"/>`;
        joinRow.style.display='flex';
      }else joinRow.style.display='none';
      overlay.classList.add('open');
    }
    function closeProfile(){overlay.classList.remove('open');currentMember=null;}
    closeBtn.addEventListener('click',closeProfile);
    overlay.addEventListener('click',e=>{if(e.target===overlay)closeProfile();});
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeProfile();});
    document.getElementById('staff-section').addEventListener('click',e=>{
      const card=e.target.closest('.staff-card');
      if(!card)return;
      const m=window._staffFlat[parseInt(card.dataset.idx)];
      if(m)openProfile(m);
    });
    document.getElementById('copyUsername').addEventListener('click',()=>{if(!currentMember)return;navigator.clipboard.writeText(currentMember.username||currentMember.name).then(()=>showToast('✓ Username copied!')).catch(()=>showToast('✓ '+(currentMember.username||currentMember.name)));});
    document.getElementById('copyUserId').addEventListener('click',()=>{if(!currentMember)return;navigator.clipboard.writeText(currentMember.id).then(()=>showToast('✓ ID copied!')).catch(()=>showToast('✓ '+currentMember.id));});
    document.addEventListener('contextmenu',e=>e.preventDefault());
    document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&['s','u','p'].includes(e.key.toLowerCase()))e.preventDefault();if(e.key==='F12')e.preventDefault();});
  </script>
</body>
</html>
